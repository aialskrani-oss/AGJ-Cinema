<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — AGJ Cinema</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #141414;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
      text-align: center;
    }
    .icon { font-size: 4rem; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    h1 { font-size: 1.75rem; font-weight: 900; }
    h1 span { color: #06b6d4; }
    p { color: rgba(255,255,255,0.5); font-size: 0.95rem; max-width: 320px; line-height: 1.6; }
    button {
      background: #06b6d4;
      color: #000;
      font-weight: 700;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 9999px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    button:hover { background: #22d3ee; }
    .badge {
      background: rgba(6,182,212,0.1);
      border: 1px solid rgba(6,182,212,0.3);
      color: #06b6d4;
      font-size: 0.75rem;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1><span>AGJ</span> Cinema</h1>
  <span class="badge">You're offline</span>
  <p>It looks like you're not connected to the internet. Check your connection and try again.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
