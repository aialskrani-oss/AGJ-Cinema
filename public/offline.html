<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لا يوجد اتصال — AGJ Cinema</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #141414;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      padding: 2rem;
      text-align: center;
      overflow: hidden;
    }

    /* Animated background circles */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
    }
    body::before {
      width: 500px; height: 500px;
      top: -200px; left: -200px;
      background: radial-gradient(circle, rgba(6,182,212,0.06) 0%, transparent 70%);
      animation: drift 8s ease-in-out infinite alternate;
    }
    body::after {
      width: 400px; height: 400px;
      bottom: -150px; right: -150px;
      background: radial-gradient(circle, rgba(6,182,212,0.04) 0%, transparent 70%);
      animation: drift 10s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift { from { transform: translate(0,0); } to { transform: translate(30px, 20px); } }

    /* Logo */
    .logo {
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    .logo .accent { color: #06b6d4; }

    /* SVG icon */
    .icon-wrap {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      margin: 0.5rem auto;
      animation: pulse-ring 3s ease-in-out infinite;
    }
    @keyframes pulse-ring {
      0%,100% { box-shadow: 0 0 0 0 rgba(6,182,212,0); }
      50%      { box-shadow: 0 0 0 16px rgba(6,182,212,0.06); }
    }

    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(6,182,212,0.1);
      border: 1px solid rgba(6,182,212,0.25);
      color: #06b6d4;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.3rem 0.85rem;
      border-radius: 9999px;
    }
    .badge::before {
      content: '';
      display: inline-block;
      width: 7px; height: 7px;
      background: #06b6d4;
      border-radius: 50%;
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

    h1 {
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 900;
      line-height: 1.2;
    }

    p {
      color: rgba(255,255,255,0.45);
      font-size: 0.9rem;
      max-width: 300px;
      line-height: 1.7;
    }

    button {
      background: #06b6d4;
      color: #000;
      font-weight: 700;
      border: none;
      padding: 0.75rem 2.25rem;
      border-radius: 9999px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }
    button:hover  { background: #22d3ee; }
    button:active { transform: scale(0.96); }

    .hint {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.2);
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="logo"><span class="accent">AGJ</span> Cinema</div>

  <div class="icon-wrap">
    <!-- Wi-Fi off icon -->
    <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24"
      fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.8"
      stroke-linecap="round" stroke-linejoin="round">
      <line x1="2" y1="2" x2="22" y2="22"/>
      <path d="M8.5 16.5a5 5 0 0 1 7 0"/>
      <path d="M2 8.82a15 15 0 0 1 4.17-2.65"/>
      <path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76"/>
      <path d="M16.85 11.25a10 10 0 0 1 2.22 1.68"/>
      <path d="M5 12.5A10 10 0 0 1 7.5 11"/>
      <circle cx="12" cy="20" r="1" fill="rgba(255,255,255,0.25)" stroke="none"/>
    </svg>
  </div>

  <span class="badge">أنت غير متصل</span>

  <h1>لا يوجد اتصال بالإنترنت</h1>

  <p>يبدو أنك غير متصل بالإنترنت. تحقق من اتصالك ثم حاول مرة أخرى.</p>

  <button onclick="window.location.reload()">🔄 إعادة المحاولة</button>

  <p class="hint">بعض الصفحات قد تكون متاحة بدون إنترنت إذا قمت بزيارتها سابقاً</p>
</body>
</html>
