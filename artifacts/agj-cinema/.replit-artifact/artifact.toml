kind = "web"
previewPath = "/"
title = "AGJ Cinema"
version = "1.0.0"
id = "artifacts/agj-cinema"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22772

[services.development]
run = "pnpm --filter @workspace/agj-cinema run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/agj-cinema", "run", "build" ]
publicDir = "artifacts/agj-cinema/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22772"
BASE_PATH = "/"
